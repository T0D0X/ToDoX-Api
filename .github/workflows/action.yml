name: 'Setup environment'
description: 'Sets up JDK, SBT, and docker-compose'
runs:
  using: 'composite'
  steps:
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'sbt'

    - name: Setup SBT
      uses: sbt/setup-sbt@v1