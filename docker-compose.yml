version: '3.8'

services:
  postgres-test:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: todo_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test_user -d todo_test" ]
      interval: 3s
      timeout: 3s
      retries: 5

  postgres-migration:
    image: flyway/flyway:9.22-alpine
    command: -url=jdbc:postgresql://postgres-test:5432/todo_test -user=test_user -password=test_password -schemas=public migrate
    volumes:
      - ./src/main/resources/db/migrations:/flyway/sql
